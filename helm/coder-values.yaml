        # GitHub OAuth
        - name: CODER_OAUTH2_GITHUB_ALLOW_SIGNUPS
          value: ENC[AES256_GCM,data:9XbmYg==,iv:QLpLYChzyTaLCwbs5WxhRyu5rWiTVIlPwbklImeNK6k=,tag:1S8ESQWVyvcDRrV58JfTOg==,type:str]
